# Knowledge graph ontology for the pubmed_graph pipeline.
#
# This file is the SINGLE SOURCE OF TRUTH for entity types, relation types,
# alias maps, and the heuristic regexes used by normalize.py /
# entity_verification.py / triple_extraction prompt rendering.
#
# Snapshot policy: this file was bootstrapped from the hardcoded constants
# that previously lived in pubmed_graph/normalize.py and
# pubmed_graph/entity_verification.py as of 2026-04-10. Stage 1 of the
# refactor requires that loading this file and using the Ontology class
# produces bit-for-bit equivalent normalize_triple_rows output.
#
# Extension policy: stage 2 introduces OntologyProposerAgent which can
# add entries here at runtime under `extensions:` (written to
# ontology.run.yaml, NOT to this base file). Anything in `core_*:` is
# considered stable and downstream consumers (question_generation) may
# rely on its presence.

version: "1.0.0"
generated_at: "2026-04-10"

# ---------------------------------------------------------------------------
# ENTITY TYPES
# Order must match the original prompts/triple_extraction.txt entity-type
# bullet list so that the rendered Jinja template stays byte-equivalent.
# ---------------------------------------------------------------------------
entity_types:
  - id: Gene
    description: "A heritable unit of DNA encoding a functional product, typically referred to by an HGNC symbol."
    examples: ["BRCA1", "FGFR3", "TP53", "KRAS"]
    surface_aliases: ["gene", "genes"]

  - id: Protein
    description: "A polypeptide gene product or a member of a protein family."
    examples: ["Cullin-3", "p53", "FGFR3", "IGF2BP1"]
    surface_aliases: ["protein", "proteins"]

  - id: Pathway
    description: "A named signaling or metabolic pathway."
    examples: ["MAPK signaling pathway", "Wnt pathway", "Hippo pathway"]
    surface_aliases: ["pathway"]

  - id: Disease
    description: "A named disease, disorder, syndrome, or neoplasm."
    examples: ["bladder cancer", "triple-negative breast cancer", "osteoarthritis"]
    surface_aliases: ["disease"]

  - id: ClinicalEndpoint
    description: "A measurable clinical outcome such as overall survival, treatment response, recurrence."
    examples: ["overall survival", "progression-free survival", "treatment response"]
    surface_aliases: ["clinical_endpoint", "clinical endpoint", "endpoint"]

  - id: BiologicalProcess
    description: "A cellular or organismal process such as apoptosis, proliferation, migration."
    examples: ["apoptosis", "cell migration", "angiogenesis"]
    surface_aliases: ["biological_process", "biological process", "process"]

  - id: Drug
    description: "A small molecule, biologic, or compound with a name or code."
    examples: ["erdafitinib", "cisplatin", "KRX-0401"]
    surface_aliases: ["drug", "compound", "chemical"]

  - id: Biomarker
    description: "A measurable indicator used for diagnosis, prognosis, or response prediction."
    examples: ["PD-L1", "Ki-67"]
    surface_aliases: ["biomarker"]

  - id: CellLine
    description: "An established immortalized cell line."
    examples: ["T24", "HeLa", "MCF-7"]
    surface_aliases: ["cell_line", "cell line"]

  - id: CellType
    description: "A cell type or developmental cell state, distinct from an immortalized cell line."
    examples: ["definitive endoderm cells", "PBMCs", "embryonic stem cells"]
    surface_aliases: ["cell_type", "cell type"]

  - id: Complex
    description: "A multi-protein assembly or complex."
    examples: ["NSE subunits", "Smc5/6 complex", "BAF complex"]
    surface_aliases: ["complex"]

  - id: TissueRegion
    description: "An anatomical tissue or region under study."
    examples: ["bladder mucosa", "tumor stroma"]
    surface_aliases: ["tissue_region", "tissue region"]

  - id: StainingMethod
    description: "A histology / pathology staining or readout method."
    examples: ["immunohistochemistry", "IHC", "H&E staining"]
    surface_aliases: ["staining_method", "staining method"]

  - id: Algorithm
    description: "A computational classifier or analysis algorithm."
    examples: ["random forest", "SVM"]
    surface_aliases: ["algorithm"]

  - id: RNA
    description: "A specific RNA species (mRNA, lncRNA, miRNA, etc.)."
    examples: ["KRAS mRNA", "HOTAIR", "miR-21"]
    surface_aliases: ["rna"]

  - id: MolecularEntity
    description: "A specific small molecule, modification, or chemical entity that is not a drug."
    examples: ["N6-methyladenosine", "m6A", "N1-methyladenosine"]
    surface_aliases: ["molecular_entity", "molecular entity"]

# ---------------------------------------------------------------------------
# CORE RELATIONS — stable contract for downstream consumers
# These 13 relations are exactly the ALLOWED_RELATIONS set from normalize.py.
# question_generation/evidence_profiler.py grades each one. Do not delete
# entries from this list without coordinating with question_generation.
# ---------------------------------------------------------------------------
core_relations:
  - id: associated_with
    directionality: undirected
    head_types: ["*"]
    tail_types: ["*"]
    description: "Generic statistical or contextual association."
    surface_aliases:
      - "associated_with"
      - "associated with"
      - "correlated_with"
      - "correlates_with"
      - "association"
      - "regulator"
      - "expression"

  - id: overexpressed_in
    directionality: directed
    head_types: ["Gene", "Protein", "RNA", "Biomarker", "MolecularEntity"]
    tail_types: ["Disease", "TissueRegion", "CellType", "CellLine"]
    surface_aliases:
      - "overexpressed_in"
      - "overexpressed in"

  - id: downregulated_in
    directionality: directed
    head_types: ["Gene", "Protein", "RNA", "Biomarker", "MolecularEntity"]
    tail_types: ["Disease", "TissueRegion", "CellType", "CellLine"]
    surface_aliases:
      - "downregulated_in"
      - "downregulated in"
      - "underexpressed_in"
      - "underexpressed in"

  - id: upregulated_in
    directionality: directed
    head_types: ["Gene", "Protein", "RNA", "Biomarker", "MolecularEntity"]
    tail_types: ["Disease", "TissueRegion", "CellType", "CellLine"]
    surface_aliases: []

  - id: part_of
    directionality: directed
    head_types: ["*"]
    tail_types: ["Complex", "Pathway", "BiologicalProcess"]
    surface_aliases:
      - "part_of"
      - "part-of"
      - "member_of"
      - "member of"
      - "component_of"
      - "component of"

  - id: involved_in
    directionality: directed
    head_types: ["*"]
    tail_types: ["BiologicalProcess", "Pathway"]
    surface_aliases:
      - "involved_in"
      - "involved in"
      - "participates_in"
      - "participates in"
      - "pathway"
      - "influenced"

  - id: involved_in_pathway
    directionality: directed
    head_types: ["*"]
    tail_types: ["Pathway"]
    description: "Specialization of involved_in when the tail is explicitly a Pathway."
    surface_aliases: []

  - id: improves
    directionality: directed
    head_types: ["Drug", "Protein", "Biomarker"]
    tail_types: ["ClinicalEndpoint"]
    surface_aliases:
      - "improves"
      - "enhances"

  - id: promotes
    directionality: directed
    head_types: ["*"]
    tail_types: ["BiologicalProcess", "Pathway", "Disease", "ClinicalEndpoint"]
    surface_aliases:
      - "promotes"
      - "positively_affects"
      - "favors"

  - id: activates
    directionality: directed
    head_types: ["*"]
    tail_types: ["Protein", "Pathway", "BiologicalProcess", "Gene"]
    surface_aliases:
      - "activates"

  - id: inhibits
    directionality: directed
    head_types: ["*"]
    tail_types: ["Protein", "Pathway", "BiologicalProcess", "Gene"]
    surface_aliases:
      - "inhibits"

  - id: downregulates
    directionality: directed
    head_types: ["*"]
    tail_types: ["Gene", "Protein", "RNA", "Pathway"]
    surface_aliases:
      - "downregulates"
      - "suppresses"
      - "silences"

  - id: upregulates
    directionality: directed
    head_types: ["*"]
    tail_types: ["Gene", "Protein", "RNA", "Pathway"]
    surface_aliases:
      - "upregulates"

# ---------------------------------------------------------------------------
# Relation aliases that resolve to a relation NOT in core_relations.
# These come from RELATION_MAP entries whose value is itself just an alias.
# ---------------------------------------------------------------------------
relation_resolution:
  # surface key → resolved canonical relation id
  recruits: associated_with               # see canonical_relation override
  binds_to: associated_with
  bound_to: associated_with
  interacted_with: associated_with
  interacts_with: associated_with
  activated_by: activates                 # head/tail flip handled in normalize_triple_row
  inhibited_by: inhibits
  upregulated_by: upregulates
  downregulated_by: downregulates
  gene_expression: regulates_expression_of   # synthetic; further resolved by surface verb
  expression: associated_with

# Verb hint sets that drive last-resort relation inference (ASSOCIATION_HINTS / IMPROVEMENT_HINTS).
relation_hints:
  association_hints:
    [associate, associated, association, correlate, correlated, link, linked]
  improvement_hints:
    [improve, improved, improves, enhance, enhanced, enhances, benefit, beneficial, better]

# Surface keys whose appearance in surface_relation triggers head/tail swap
# in normalize_triple_row.
swap_surface_relations:
  activated_by: activates
  inhibited_by: inhibits
  upregulated_by: upregulates
  downregulated_by: downregulates

