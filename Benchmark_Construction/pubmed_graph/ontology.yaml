# ---------------------------------------------------------------------------
# CONTEXTUAL OVERRIDES — case rules where evidence text decides the canonical
# form. These come from canonical_entity_name() and entity_verification.
#
# Stage 3.1: NSE / SMC / definitive endoderm overrides removed. Per-paper
# terminology is now resolved at runtime by OntologyProposerAgent + the
# sciverse/pubmed/mesh-backed EntityCanonicalizer. The legacy entries are
# preserved in `legacy_overrides_disabled` below for historical reference.
# ---------------------------------------------------------------------------
contextual_overrides: []

legacy_overrides_disabled:
  - key: nse
    when: ["nse subunits", "smc5/6"]
    canonical: "NSE subunits"
    type: Complex
  - key: smcs
    when: ["smc5/6"]
    canonical: "SMC proteins"
    type: Protein
  - key: smc
    when: ["smc5/6"]
    canonical: "SMC proteins"
    type: Protein
  - key: "smooth muscle cells"
    when: ["smc5/6"]
    canonical: "SMC proteins"
    type: Protein
  - key: "de cells"
    when: []
    canonical: "definitive endoderm cells"
    type: CellType
  - key: "definitive endoderm"
    when: []
    canonical: "definitive endoderm cells"
    type: CellType
  - key: "definitive endoderm cells"
    when: []
    canonical: "definitive endoderm cells"
    type: CellType

# ---------------------------------------------------------------------------
# REGEX-DRIVEN TYPING — these mirror the regexes hardcoded in normalize.py.
# Order in this list = priority. canonical_entity_type() applies them in order.
# ---------------------------------------------------------------------------
type_regex_rules:
  - id: molecular_entity_re
    pattern: "^(?:m6a|n6[- ]methyladenosine|n1[- ]methyladenosine|m1a|n6,2'-o-dimethyladenosine)$"
    flags: ["IGNORECASE"]
    type: MolecularEntity

  - id: protein_family_re
    pattern: "^(?:IGF2BP|HNRNP|hnRNP|BRD|LATS|MST|TMPRSS|FZD|SMC|NSE|CUL)\\w*(?:[-/–]\\w+)*$"
    flags: []
    type: Protein

  - id: protein_name_hint_re
    pattern: "\\b(?:cullin(?:[- ]\\d+)?|cul\\d+|kinase|phosphatase|ligase|receptor|histone|actin|tubulin|integrin|cyclin|protease|transporter|subunit)\\b"
    flags: ["IGNORECASE"]
    type: Protein

  - id: phospho_protein_re
    pattern: "^(?:p|P)-[A-Za-z0-9]+(?:-[A-Za-z0-9]+)*$"
    flags: []
    type: Protein

  - id: drug_code_re
    pattern: "^[A-Z]{2,6}-\\d{2,6}[A-Z]?$"
    flags: []
    type: Drug

  - id: survival_re
    pattern: "\\b(overall survival|progression-free survival|disease-free survival|relapse-free survival|survival rate)\\b"
    flags: ["IGNORECASE"]
    type: ClinicalEndpoint

# Substring-driven typing applied AFTER regex rules in canonical_entity_type.
type_substring_rules:
  - type: ClinicalEndpoint
    any_of: ["prognosis", "progression", "recurrence", "mortality", "treatment response", "response rate", "resistance"]
  - type: Pathway
    any_of: ["pathway", "pathways", "signaling", "signalling", "cascade"]
  - type: Complex
    any_of: ["complex"]
  # cell-type heuristic is handled by cell_type_hints below; staining + algorithm here
  - type: StainingMethod
    any_of: ["immunohistochemistry", "staining"]
    exact_lower: ["ihc"]
  - type: Algorithm
    any_of: ["algorithm", "classifier", "random forest"]
    exact_lower: ["svm"]
  - type: CellLine
    any_of: ["cell line"]
  - type: BiologicalProcess
    any_of: ["apoptosis", "carcinogenesis", "cell survival", "cell death", "proliferation", "angiogenesis", "migration", "invasion"]
  - type: Disease
    any_of: ["cancer", "carcinoma", "neoplasm", "tumor", "tumour", "disease", "syndrome"]

# Phospho-protein prefix override (lower.startswith check, applied alongside PHOSPHO_PROTEIN_RE).
phospho_protein_prefixes:
  - "phospho-"

# Final replacement passes applied in canonical_entity_name when type matches.
canonical_name_replacements:
  - when_type: ClinicalEndpoint
    replacements:
      - from: "positive survival rate"
        to: "overall survival"

# Suffix-driven typing applied between regex and substring stages.
type_suffix_rules:
  - type: BiologicalProcess
    suffix: " modification"
  - type: BiologicalProcess
    suffix: " interaction"
    require_dash_in_text: true

# Cell type heuristics (looks_like_cell_type / looks_like_cell_line in normalize.py)
cell_type_hints:
  exact_lower:
    - pbmcs
    - escs
    - "embryonic stem cells"
    - "definitive endoderm"
    - "definitive endoderm cells"
    - mesendoderm
    - "mesendoderm cells"
  suffix_lower:
    - " cells"
    - " cell"
  exclude_substring_lower:
    - "cell line"

# Stage 3.1: removed the hardcoded "Complex" exact-match set. NSE / SMC
# names that legitimately denote a multi-protein complex must now be
# either grounded by EntityCanonicalizer (mesh/pubmed/sciverse) or proposed
# as an alias by OntologyProposerAgent.
complex_exact_lower: []

# Generic entity blocklist used by _is_generic_entity / _should_drop.
generic_entity_blocklist:
  - study
  - studies
  - author
  - authors
  - paper
  - researcher
  - researchers
  - method
  - methods
  - result
  - results
  - analysis
  - patient
  - patients
  - group
  - groups
  - cohort
  - cohorts

# Sentence-fragment heuristic in _looks_like_sentence_entity.
# Stage 5 (2026-04-11): tightened from max_words=10 to 8 and added a
# conjunction detector because the full run produced a 2927-degree hub
# "Programmed Cell Death 1 and Programmed Cell Death Ligand 1" (9 words)
# that squeezed past the old max_words=10 rule.
sentence_entity_prefixes:
  - "interaction between "
  - "binding of "
  - "association between "
sentence_entity_max_words: 8
sentence_conjunction_words: [" and ", " or ", " versus ", " vs. "]
sentence_conjunction_max_words: 5

# Short upper-case acronym filter used by _should_drop for Disease/ClinicalEndpoint.
short_upper_acronym_pattern: "^[A-Z]{2,4}$"

# Forbidden direction edges enforced in _should_drop.
forbidden_direction_drops:
  - relation_in: [downregulates, upregulates, regulates_expression_of]
    head_type: Disease
    tail_type_in: [Gene, Protein]

